name: Build docker image

on:
  push:
    branches:
      - main

    tags:
      - '*'

  pull_request:

env:
  PROMETHEUS313: '3.13.1'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      prometheus-versions: ${{ steps.set-matrix.outputs.prometheus-versions }}
    steps:
      - id: set-matrix
        run: |
          cat << 'EOF' > versions.json
          [
            {"key": "prometheus313", "version": "${{ env.PROMETHEUS313 }}", "latest": "1", "latest_major": "1"}
          ]
          EOF
          echo "prometheus-versions=$(jq -c . versions.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      matrix:
        prometheus: ${{ fromJson(needs.setup.outputs.prometheus-versions) }}
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push
        env:
          PROMETHEUS_VER: ${{ matrix.prometheus.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          make
          make test
          make push

  push:
    runs-on: ubuntu-latest
    needs:
      - setup
      - build
    strategy:
      matrix:
        prometheus: ${{ fromJson(needs.setup.outputs.prometheus-versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: ./.github/actions
        with:
          version: ${{ matrix.prometheus.version }}
          latest: ${{ matrix.prometheus.latest }}
          latest_major: ${{ matrix.prometheus.latest_major }}
